
        <!DOCTYPE html>
        <html lang="pt-br">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Galeria Saveiro Cross</title>
            <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
            <style>
                /* Estilos para a Lista de Fotos Grandes */
                .large-image-block {
                    margin-bottom: 3rem; /* Espaçamento entre as fotos */
                    padding-bottom: 2rem;
                    border-bottom: 1px solid #dee2e6; /* Linha divisória sutil */
                }
                .large-image-block:last-child {
                    border-bottom: none; /* Remove a linha da última foto */
                }
                .large-image-block img {
                    max-width: 100%; /* Garante responsividade total */
                    height: auto;
                    border-radius: 8px; /* Bordas levemente arredondadas */
                    box-shadow: 0 4px 15px rgba(0,0,0,0.1); /* Sombra suave */
                }
                .large-image-title {
                    font-size: 1.25rem; /* Tamanho do título confortável para mobile */
                    font-weight: 600;
                    margin-top: 1rem;
                    color: #343a40;
                }
                /* Ajuste para telas maiores (Desktop) */
                @media (min-width: 992px) {
                    .large-image-block img {
                        border-radius: 12px;
                        box-shadow: 0 8px 30px rgba(0,0,0,0.1);
                    }
                    .large-image-title {
                        font-size: 1.5rem;
                        margin-top: 1.5rem;
                    }
                }
            </style>
        </head>
        <body class="bg-light">
            <div class="container py-4 py-md-5">
                <header class="text-center mb-5">
                    <h1 class="display-5 fw-bold">Galeria Saveiro Cross</h1>
                    <p class="lead text-muted">VW Saveiro CD Cross MA - 2019/2019</p>
                    <hr class="my-4">
                </header>

                <section>
                    <div class="row justify-content-center">
                        <div class="col-12 col-lg-10">
        
                            <div class="large-image-block text-center">
                                <img src="Lateral Motorista 1.jpeg" alt="Lateral Motorista 1.jpeg" class="img-fluid" loading="lazy">
                                <div class="large-image-title">Lateral Motorista 1</div>
                            </div>
            
                            <div class="large-image-block text-center">
                                <img src="Frente 1.jpeg" alt="Frente 1.jpeg" class="img-fluid" loading="lazy">
                                <div class="large-image-title">Frente 1</div>
                            </div>
            
                            <div class="large-image-block text-center">
                                <img src="Frente e lateral Motorista 1.jpeg" alt="Frente e lateral Motorista 1.jpeg" class="img-fluid" loading="lazy">
                                <div class="large-image-title">Frente e lateral Motorista 1</div>
                            </div>
            
                            <div class="large-image-block text-center">
                                <img src="Traseira 1.jpeg" alt="Traseira 1.jpeg" class="img-fluid" loading="lazy">
                                <div class="large-image-title">Traseira 1</div>
                            </div>
            
                            <div class="large-image-block text-center">
                                <img src="Traseira e lateral passageiro 1.jpeg" alt="Traseira e lateral passageiro 1.jpeg" class="img-fluid" loading="lazy">
                                <div class="large-image-title">Traseira e lateral passageiro 1</div>
                            </div>
            
                            <div class="large-image-block text-center">
                                <img src="Frente e lateral Motorista 2.jpeg" alt="Frente e lateral Motorista 2.jpeg" class="img-fluid" loading="lazy">
                                <div class="large-image-title">Frente e lateral Motorista 2</div>
                            </div>
            
                            <div class="large-image-block text-center">
                                <img src="Frente e lateral passageiro 1.jpeg" alt="Frente e lateral passageiro 1.jpeg" class="img-fluid" loading="lazy">
                                <div class="large-image-title">Frente e lateral passageiro 1</div>
                            </div>
            
                            <div class="large-image-block text-center">
                                <img src="Traseira e lateral motorista 1.jpeg" alt="Traseira e lateral motorista 1.jpeg" class="img-fluid" loading="lazy">
                                <div class="large-image-title">Traseira e lateral motorista 1</div>
                            </div>
            
                        </div>
                    </div>
                </section>

                <footer class="text-center text-muted py-4 mt-5 border-top">
                    <small>Gerado automaticamente | 8 fotos</small>
                </footer>

            </div>
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        </body>
        </html>
